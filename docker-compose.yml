services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lg_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lg_password}
      POSTGRES_DB: ${POSTGRES_DB:-lg_bom}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lg}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: lg_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/11434' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  ollama_data:
