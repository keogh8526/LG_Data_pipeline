services:
  neo4j:
    image: neo4j:5
    container_name: lg_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      # Vector index support is built into Neo4j 5.x.
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: lg_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/11434' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: python:3.11-slim
    container_name: lg_backend
    working_dir: /app
    command: >
      sh -c "pip install uv && uv sync &&
             uv run uvicorn src.api.app:app --host 0.0.0.0 --port 8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - neo4j
      - ollama

  streamlit:
    image: python:3.11-slim
    container_name: lg_streamlit
    working_dir: /app
    command: >
      sh -c "pip install uv && uv sync &&
             uv run streamlit run src/ui/streamlit_app.py
             --server.port 8501 --server.address 0.0.0.0"
    environment:
      API_BASE: http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - backend

volumes:
  neo4j_data:
  ollama_data:
