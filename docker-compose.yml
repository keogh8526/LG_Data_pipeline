services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lg_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lg_password}
      POSTGRES_DB: ${POSTGRES_DB:-lg_bom}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lg}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: lg_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # D-012 GPU 가속 — NVIDIA Container Toolkit 또는 Docker Desktop WSL2 + GPU
    # passthrough가 활성화된 머신에서만 동작. RTX 5070 Ti + driver 591.86 확인.
    # GPU 없는 환경에선 본 section을 주석 처리하면 자동으로 CPU fallback.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/11434' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  ollama_data:
