# 96col (현재 표준) -> 통합 v1.2 매핑 룰
# TODO(real-data): 실제 96col 파일의 R9 헤더 도착 시 source_col / source_row_offset
# 정밀 보정 필요. confidence < 0.85 항목은 사람 검수 대상.
form_version: "96col"
header_row_offset: 9
mappings:
  - source_col: "Base P/No"
    target_field: "base_part_no"
    transformation: "normalize_part_no"
    confidence: 0.98
  - source_col: "New P/No"
    target_field: "new_part_no"
    transformation: "normalize_part_no"
    confidence: 0.98
  - source_col: "Class Desc."
    target_field: "part_name"
    transformation: "strip"
    confidence: 0.9
  - source_col: "BOM Level"
    target_field: "bom_level"
    transformation: "to_int"
    confidence: 0.95
  - source_col: "Part Type"
    target_field: "part_type"
    transformation: "strip"
    confidence: 0.9
  - source_col: "구분"
    target_field: "change_type"
    transformation: "strip"
    confidence: 0.92
  - source_col: "변경점"
    target_field: "change_point"
    transformation: "strip"
    confidence: 0.9
  - source_col: "변경사유"
    target_field: "change_reason"
    transformation: "strip"
    confidence: 0.9
  - source_col: "Qty"
    target_field: "qty"
    transformation: "to_float"
    confidence: 0.95
  - source_col: "Base Model"
    target_field: "common.base_model"
    transformation: "strip"
    confidence: 0.88
