# 20col (구버전) -> 통합 v1.2 매핑 룰
# TODO(real-data): 구버전 20col은 컬럼 누락이 잦음. 누락 시 entity_resolution
# 단계에서 보강. confidence < 0.85 항목은 사람 검수 대상.
form_version: "20col"
header_row_offset: 2
mappings:
  - source_col: "Base P/No"
    target_field: "base_part_no"
    transformation: "normalize_part_no"
    confidence: 0.9
  - source_col: "New P/No"
    target_field: "new_part_no"
    transformation: "normalize_part_no"
    confidence: 0.9
  - source_col: "Part Name"
    target_field: "part_name"
    transformation: "strip"
    confidence: 0.85
  - source_col: "구분"
    target_field: "change_type"
    transformation: "strip"
    confidence: 0.8
  - source_col: "변경점"
    target_field: "change_point"
    transformation: "strip"
    confidence: 0.8
  - source_col: "Qty"
    target_field: "qty"
    transformation: "to_float"
    confidence: 0.85
