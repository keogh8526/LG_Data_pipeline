# 96col -> 96col identity mapping (answer schema).
# Source column names are the real LG header names; this file documents them
# and applies the same minimal cleanup applied to every form.

form_version: "96col"
header_row: 9    # multi-header R1~R8 above; real column names at row 9.

sheet_filter:
  include_patterns: [".*"]
  exclude_patterns: ["부품 등급 Guide", "History", "Cover", "Index"]

mappings:
  base_part_no:
    sources:
      - {column_name: "Base P/No", priority: 1}
      - {column_name: "P/no.", priority: 2}
    transformations: [strip, upper]
    required: true

  new_part_no:
    sources:
      - {column_name: "New P/No", priority: 1}
    transformations: [strip, upper]
    required: false

  part_name:
    sources:
      - {column_name: "Class Desc.", priority: 1}
      - {column_name: "부품명", priority: 2}
    transformations: [strip]
    required: true

  bom_level:
    sources:
      - {column_name: "BOM Level", priority: 1}
      - {column_name: "Lvl", priority: 2}
    transformations: [{type: cast, to: int}]
    required: true

  part_type:
    sources:
      - {column_name: "Part Type", priority: 1}
    transformations: [strip]
    required: true

  change_type:
    sources:
      - {column_name: "구분", priority: 1}
    transformations: [strip, {type: map_alias, field: change_type}]
    required: true
    allowed: ["New", "Change", "Carry-over"]

  change_point:
    sources:
      - {column_name: "변경점", priority: 1}
    transformations: [strip]
    required: true

  change_reason:
    sources:
      - {column_name: "변경사유", priority: 1}
    transformations: [strip]
    required: false

  qty:
    sources:
      - {column_name: "Qty", priority: 1}
    transformations: [{type: cast, to: float}]
    required: false

  model_code:
    sources:
      - {column_name: "Model Code", priority: 1}
      - {column_name: "Base Model", priority: 2}
    transformations: [strip, upper]
    required: true
