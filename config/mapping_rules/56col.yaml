# 56col -> 96col answer schema mapping.
# Middle form (2024.04~2024.10). Per-grade sheets (Better-1, Best-1, ...).
# The grade is encoded in the sheet name and recorded as ``common.grade``
# downstream (Step 4 enriches from sheet name).

form_version: "56col"
header_row: 1

sheet_filter:
  include_patterns: ["Better.*", "Best.*", "Good.*"]
  exclude_patterns: ["History", "Cover"]

mappings:
  base_part_no:
    sources:
      - {column_name: "Base P/No", priority: 1}
      - {column_name: "P/no.", priority: 2}
    transformations: [strip, upper]
    required: true

  new_part_no:
    sources:
      - {column_name: "New P/No", priority: 1}
    transformations: [strip, upper]
    required: false

  part_name:
    sources:
      - {column_name: "Part Name", priority: 1}
      - {column_name: "Class Desc.", priority: 2}
    transformations: [strip]
    required: true

  bom_level:
    sources:
      - {column_name: "BOM Level", priority: 1}
      - {column_name: "Lvl", priority: 2}
    transformations: [{type: cast, to: int}]
    required: false

  part_type:
    sources:
      - {column_name: "Part Type", priority: 1}
    transformations: [strip]
    required: false

  change_type:
    sources:
      - {column_name: "구분", priority: 1}
    transformations: [strip, {type: map_alias, field: change_type}]
    required: false

  change_point:
    sources:
      - {column_name: "변경점", priority: 1}
    transformations: [strip]
    required: false

  change_reason:
    sources:
      - {column_name: "변경사유", priority: 1}
    transformations: [strip]
    required: false

  qty:
    sources:
      - {column_name: "Qty", priority: 1}
    transformations: [{type: cast, to: float}]
    required: false

  model_code:
    sources:
      - {column_name: "Base Model", priority: 1}
      - {column_name: "Model Code", priority: 2}
    transformations: [strip, upper]
    required: true
