# 20col -> 96col answer schema mapping.
# Old form (pre-2024.04). Many fields are optional because the old form did
# not carry them; missing required fields go to quarantine.

form_version: "20col"
header_row: 2

sheet_filter:
  include_patterns: [".*"]
  exclude_patterns: ["History"]

mappings:
  base_part_no:
    sources:
      - {column_name: "P/no.", priority: 1}
      - {column_name: "Base P/No", priority: 2}
    transformations: [strip, upper]
    required: true

  new_part_no:
    sources:
      - {column_name: "New P/No", priority: 1}
    transformations: [strip, upper]
    required: false

  part_name:
    sources:
      - {column_name: "Part Name", priority: 1}
      - {column_name: "부품명", priority: 2}
    transformations: [strip]
    required: true

  bom_level:
    sources:
      - {column_name: "Lvl", priority: 1}
      - {column_name: "BOM Level", priority: 2}
    transformations: [{type: cast, to: int}]
    required: false

  part_type:
    sources:
      - {column_name: "Type", priority: 1}
      - {column_name: "Part Type", priority: 2}
    transformations: [strip]
    required: false

  change_type:
    sources:
      - {column_name: "구분", priority: 1}
    transformations: [strip, {type: map_alias, field: change_type}]
    required: false

  change_point:
    sources:
      - {column_name: "변경점", priority: 1}
    transformations: [strip]
    required: false

  change_reason:
    sources:
      - {column_name: "변경사유", priority: 1}
    transformations: [strip]
    required: false

  qty:
    sources:
      - {column_name: "Qty", priority: 1}
    transformations: [{type: cast, to: float}]
    required: false

  model_code:
    sources:
      - {column_name: "Model Code", priority: 1}
      - {column_name: "Base Model", priority: 2}
    transformations: [strip, upper]
    required: false
