# v2.0 핵심 운영 자산 — preprocessing_v2.md §11.
#
# 헤더명(path 포함) → Core 필드 매핑. 신규 양식이 들어와도 자동으로 Core를
# 추출할 수 있게 함. 운영 중 사람 검토로 누적 성장하는 "성장형" 파일.
#
# - exact:               정확 일치 우선
# - fuzzy_keywords:      Levenshtein ≥0.85 fallback
# - sheet_meta_path:     시트 상단 라벨/값 페어에서 추출 (행2 컬럼 N)
# - sheet_name_pattern:  시트명에서 추출 (grade 등)
# - cell_value_mapping:  셀 값 자체를 캐노니컬로 매핑 (change_type 등)
# - derived_from_buyer_code: buyer 코드에서 region 도출
#
# D-011 Phase E: is_semantic / embedding_target / semantic_anchor 필드 제거
# (multi-vector 5개 → narrative_emb 단일로 축소되며 의미 없어짐).

# ── Core 13필드 ─────────────────────────────────────────────────────

part_no:
  description: "부품의 유일 식별 코드 (10자리)"
  exact:
    # 합성 fixture 형식
    - "공통 > 부품 P/No"
    - "공통 > 부품 P/No."
    - "공통 > P/No."
    - "공통 > P/no."
    - "공통 > Part No"
    - "공통 > Part No."
    # 실데이터 (95/96/97 col 변형) — 'Common'/'공통' 대분류 + 'New P/No' leaf
    - "Common > New P/No"
    - "공통 > New P/No"
    - "Common > New P/no"
    - "New P/No"
    # 단순 leaf
    - "부품 P/No."
    - "부품 P/No"
    - "P/No."
    - "P/no."
    - "Part No"
    - "P/No"
    # 신규부품리스트_75 / UAE_신규개발_58
    - "부품 P/No.\n(신규)"
    - "부품 P/No"
    # base_master_24
    - "P/no."   # 이미 위에 있지만 명시
    - "P/No."
  fuzzy_keywords: ["P/N", "부품번호", "Part Number"]
  is_required: true

part_name:
  description: "부품명/품명/형상명"
  exact:
    - "공통 > 품명"
    - "공통 > 품명(형상명)"
    - "공통 > 형상명"
    # 실데이터 (95~97col)
    - "Common > Class Desc.(Part Name)"
    - "공통 > Class Desc.(Part Name)"
    - "Class Desc.(Part Name)"
    - "Class Desc."
    - "Desc."
    - "Desc"
    - "Description"
    - "부품명"
    - "품명"
    - "품명(형상명)"
  fuzzy_keywords: ["부품 이름", "Part Name"]
  is_required: true

base_part_no:
  description: "변경 전 부품번호 (기존 P/No.)"
  exact:
    - "공통 > 기존 부품"
    - "공통 > 기존 P/No."
    - "공통 > 기존 P/No"
    # 실데이터
    - "Common > Base P/No"
    - "공통 > Base P/No"
    - "Base P/No"
    - "기존 P/No."
    - "기존 P/No"
    - "Base P/No."
    - "Original P/No."

new_model_code:
  description: "새 모델 코드 (변경 후 적용 모델)"
  exact:
    - "DRBFM > New Model"
    - "DRBFM > 개발 모델"
    - "프로젝트 코드"
    - "신규 모델"
    - "New Model"
    - "New Model Code"
  sheet_meta_path:
    row: 2
    col: 12
  fuzzy_keywords: ["프로젝트", "신규모델"]
  is_required: true

base_model_code:
  description: "기존 모델 코드 (변경 전 양산 모델)"
  exact:
    - "DRBFM > Base Model"
    - "DRBFM > 기존 모델"
    - "기존 모델"
    - "Base Model"
    - "Base Model Code"
  sheet_meta_path:
    row: 2
    col: 9

grade:
  description: "부품 등급 (Best-1/Better-1/Good-1 BK 등)"
  exact:
    - "부품 > 부품 등급"
    - "Part Grade"
    - "Part\nGrade"   # base_master_24 줄바꿈 변형
    - "부품 등급"
    - "Grade"
  sheet_name_pattern: "(Best|Better|Good)\\s*-?\\s*[12](\\s*(BK|STS))?"
  is_required: true

region:
  description: "지역 코드 (EUR/SJ/EAP 등)"
  derived_from_buyer_code: true

change_type:
  description: "변경 유형 (New/Change/Carry-over)"
  exact:
    - "신규 구분"
    - "신규/도입"
    - "New/Change"
    - "도입/신규"
    - "구분"
    - "Change Type"
    # 변경부품 list family — Common 대분류
    - "Common > 부품 개발 등록"
    - "Common > 부품 등록 구분"
    - "Common > 신규/도입"
    - "Common > 신규구분"
    - "Common > 부품\n등록\n구분"
    - "공통 > 부품 개발 등록"
    - "부품 개발 등록"
    - "부품 등록 구분"
    - "부품\n등록\n구분"
    # base_master_24 — '신규' 컬럼 (값이 "New"/"Change")
    - "신규"
    # 신규부품리스트_75
    - "신규\n구분"
  cell_value_mapping:
    "신규": "New"
    "New": "New"
    "N": "New"
    "도입": "New"
    "Y(신규)": "New"
    "Y(도입)": "New"
    "전용": "New"           # 신규부품리스트_75 실측 (모델 전용 신규)
    "공용": "Carry-over"    # 신규부품리스트_75 실측 (모델 공용 유지)
    "변경": "Change"
    "Change": "Change"
    "C": "Change"
    "유지": "Carry-over"
    "Carry-over": "Carry-over"
    "Keep": "Carry-over"
    "K": "Carry-over"
  is_required: true

event_stage:
  description: "현 개발 단계 (CP/PP/DV/PV/PQ/MP/PreMP)"
  exact:
    - "Event"
    - "단계"
    - "Stage"
    - "Phase"
  cell_value_pattern: "(CP|PP|DV|PV|PQ|MP|PreMP)"

change_point:
  description: "변경점 자유텍스트 — 무엇이 바뀌었는지"
  exact:
    - "DRBFM > 변경점"
    - "DRBFM > 변경 점"
    # 실데이터
    - "DRBFM Execution > 변경점"
    - "DRBFM Execution > 변경 점"
    - "Common > 변경점"
    - "변경점"
    - "Change Point"
    - "Change point"
  fuzzy_keywords: ["변경 내용", "변경 사항"]

change_reason:
  description: "변경 사유 — 왜 바꾸는지"
  exact:
    - "DRBFM > 변경 사유"
    - "DRBFM > 변경사유"
    # 실데이터 — Common 대분류 + 변경 사유
    - "Common > 변경\n사유"
    - "Common > 변경 사유"
    - "공통 > 변경 사유"
    - "변경\n사유"
    - "변경사유(10자 이상)"
    - "변경사유"
    - "변경 사유"
    - "Change Reason"
    - "Reason"

bom_level:
  description: "BOM 트리 깊이 (0~10)"
  exact:
    - "부품 > BOM Level"
    - "부품 > Lvl"
    # 실데이터
    - "Common > BOM Level"
    - "공통 > BOM Level"
    - "Common > BOM\nLevel"
    - "BOM\nLevel"
    - "Lvl"
    - "BOM Level"
    - "Level"
    - "Lv"

part_type:
  description: "부품 유형 (사출/Assy/전장/단품)"
  exact:
    - "부품 > 부품 유형"
    # 실데이터
    - "Common > Part Type"
    - "공통 > Part Type"
    - "Part Type"
    - "부품 유형"
    - "MechanicalPart"
    - "유형"
  cell_value_mapping:
    "사출": "사출"
    "Injection": "사출"
    "Mechanical": "사출"
    "MechanicalPart": "사출"
    "Assy": "Assy"
    "Assembly": "Assy"
    "전장": "전장"
    "Electronic": "전장"
    "단품": "단품"
    "Single": "단품"

