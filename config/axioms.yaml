# Step 2 — deterministic domain axioms.
#
# These rules are the validation ground truth. They never call an LLM. Patterns
# and vocabularies are derived from the project spec and synthetic fixtures, and
# MUST be revised once real LG data is available (see DECISIONS D-002).

part_no:
  pattern: '^[A-Z]{2,3}\d{7,8}$'
  min_length: 9
  max_length: 11
  description: "부품번호: 영문 2-3자 + 숫자 7-8자"

model_code:
  # 실데이터 관측: WSED7667M.ABMQEUR (정형), LSIS6338F.ARSLSTC, WDEK9419S.ASTLSGN,
  # WS7D7610B (suffix 없음 + 중간에 영문 D 끼임) 모두 유효한 모델 코드. 영문-숫자
  # 혼재 접두부 + optional dot suffix 허용.
  pattern: '^[A-Z][A-Z0-9]{3,14}(\.[A-Z0-9.]+)?$'
  description: "모델코드: 영문 시작 + 영문/숫자 4~15자 + optional .suffix"

change_type:
  allowed: ["New", "Change", "Carry-over"]
  aliases:
    "신규": "New"
    "N": "New"
    "변경": "Change"
    "C": "Change"
    "유지": "Carry-over"
    "K": "Carry-over"
    "Keep": "Carry-over"
    "carryover": "Carry-over"

grade:
  allowed:
    - "Best-1"
    - "Best-2"
    - "Better-1"
    - "Better-2"
    - "Good-1"
    - "Good-2"
    - "Good-1 BK"
    - "Good-2 BK"
  aliases:
    "Best1": "Best-1"
    "B1": "Best-1"
    "Best2": "Best-2"
    "B2": "Best-2"
    "Better1": "Better-1"
    "Better2": "Better-2"
    "Good1": "Good-1"
    "Good2": "Good-2"

region:
  allowed: ["EUR", "EUE", "EAP", "SJ", "SA", "AU"]

bom_level:
  min: 0
  max: 10

event_stage:
  allowed: ["CP", "PP", "DV", "PV", "PQ"]
