# v2.0 Step 2 — 결정론적 도메인 axiom.
#
# preprocessing_v2.md §4-1 + §11 기반. LLM 호출 0회. 실측 19개 파일에서
# 관측된 변형 모두 수용하도록 보수적으로 완화.

part_no:
  # 실측 변형 수용 (D-012 격리 분석 후 완화):
  #   AGG74419321  — 표준 (영문 prefix 3 + 숫자 8)
  #   0RH4702C422  — 숫자 시작 + 영문 + 숫자 + 영문 (해외향 패턴)
  #   1TTL0402418  — 숫자 시작 + 영문 4 + 숫자 7
  #   0TR387509AB  — 숫자 + 영문 + 숫자 + 영문 2 suffix
  # 격리되어야 하는 패턴:
  #   "WDEK9429S.ATTLSNA@CVZ.EKHQ" — 점/@ 포함은 모델코드 (BOM root)
  #   "박" / "Common" / "Status" — 헤더 토큰 / 한글 1글자
  pattern: '^[0-9A-Z]{2,5}\d{2,9}[A-Z0-9]{0,8}$'
  min_length: 8
  max_length: 16
  description: "부품번호: 영숫자 prefix 2-5 + 숫자 2-9 + 영숫자 suffix 0-8. 점/@은 격리 (모델코드 패턴)."

model_code:
  # 실측 변형:
  #   "WSED7667M.ABMQEUR" (정형 .suffix)
  #   "WSED7667M" (단순)
  #   "WSED7665B(CB)" (괄호 marker)
  #   "WSED7613S / Cb (이집트)" (슬래시 sub + 한국어 국가 marker, 정규화로 개행 제거됨)
  #   "WS7D7610B" (영숫자 혼재)
  #   "BO605G1S5" (영문+숫자 반복)
  # axiom: 영문 시작 + 영숫자 본체 + optional .suffix + optional 슬래시 sub +
  #         optional 괄호 marker (한국어 포함).
  pattern: '^([A-Z][A-Z0-9]{2,18}(\.[A-Z0-9.]+)?(\s*\/\s*[A-Z0-9]+)?(\s*\([^)]+\))?|UNKNOWN)$'
  description: "모델코드: 영문 + 영숫자 + optional .suffix + optional / sub + optional (국가/marker). 또는 UNKNOWN sentinel."

change_type:
  allowed: ["New", "Change", "Carry-over"]
  aliases:
    "신규": "New"
    "New": "New"
    "N": "New"
    "변경": "Change"
    "Change": "Change"
    "C": "Change"
    "유지": "Carry-over"
    "K": "Carry-over"
    "Keep": "Carry-over"
    "Carry-over": "Carry-over"
    "carryover": "Carry-over"

grade:
  # 실측: Good-1 STS / Best-1 BK 등 BK·STS 변형 다수. 'unknown' sentinel 포함.
  allowed:
    - "Best-1"
    - "Best-2"
    - "Better-1"
    - "Better-2"
    - "Good-1"
    - "Good-2"
    - "Good-1 BK"
    - "Good-2 BK"
    - "Good-1 STS"
    - "Good-2 STS"
    - "unknown"
  aliases:
    "Best1": "Best-1"
    "B1": "Best-1"
    "Best2": "Best-2"
    "B2": "Best-2"
    "Better1": "Better-1"
    "Better2": "Better-2"
    "Good1": "Good-1"
    "Good2": "Good-2"
    "Good1 BK": "Good-1 BK"
    "Good2 BK": "Good-2 BK"
    "BK STS": "Good-1 BK"

region:
  # 실측 19개 파일에서 등장한 모든 지역.
  allowed: ["EUR", "EUE", "EAP", "SJ", "SA", "AU", "SG", "KR", "US"]

bom_level:
  min: 0
  max: 10

event_stage:
  # 실측: MP / PreMP까지 등장.
  allowed: ["CP", "PP", "DV", "PV", "PQ", "MP", "PreMP"]

part_type:
  allowed: ["사출", "Assy", "전장", "단품", "기타"]
  aliases:
    "Injection": "사출"
    "Mechanical": "사출"
    "MechanicalPart": "사출"
    "Electronic": "전장"
    "Single": "단품"
    "Other": "기타"

