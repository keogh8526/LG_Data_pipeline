# L3 Impact Analyzer — 결정론 룰 카탈로그 (설계 §5-5). LLM 호출 0회.
#
# ⚠️ TODO(expert): 조건/임계/action은 도메인 전문가 검증 필요(사람 확인 지점).
#   현재 값은 동작 가능한 합리적 기본값(seed). 코드 변경 없이 이 YAML만 수정해 튜닝.
#
# when: 단일 필드 매칭 {field, equals|in|truthy}. then: {action, tier}. priority 높을수록 우선.
#   action ∈ MODIFY/ADD/DELETE/KEEP/CHECK,  tier ∈ CORE/CASCADE.
# 룰 충돌 시 priority로 정렬해 최상위가 최종 action, 단 trace엔 발화한 룰 전부 표시.

# 하향 통제 어휘: change_attribute → 관련 부품군(part_type/classification).
# 자식 부품의 군이 여기 없으면 '무관 자식' → KEEP (cascade 차단).
attribute_part_groups:
  재질: ["사출", "단품"]
  치수: ["사출", "Assy"]
  공급처: ["전장", "단품"]
  공급유형: ["전장", "단품"]
  UIT: ["전장"]
  색상: ["사출"]
  전기: ["전장"]
  안전: ["전장", "Assy"]

rules:
  - id: R01_uit_change
    description: "UIT(부품 인정 시험) 대상 변경 → 인증 영향, CHECK"
    when: {field: uit_changed, truthy: true}
    then: {action: CHECK, tier: CORE}
    priority: 80

  - id: R02_supply_type_change
    description: "공급 유형(Supply Type) 변경 → 공급망 영향, CHECK"
    when: {field: supply_type_changed, truthy: true}
    then: {action: CHECK, tier: CORE}
    priority: 70

  - id: R03_c_osp
    description: "C-OSP 관리 부품 → 통제 영향 검토 CHECK"
    when: {field: c_osp, truthy: true}
    then: {action: CHECK, tier: CORE}
    priority: 75

  - id: R04_drbfm
    description: "DRBFM 트리거 → 신뢰성 리뷰 필수 CHECK"
    when: {field: drbfm, truthy: true}
    then: {action: CHECK, tier: CORE}
    priority: 85

  - id: R05_hsms
    description: "HSMS(유해물질) 관련 → 환경 인증 CHECK"
    when: {field: hsms, truthy: true}
    then: {action: CHECK, tier: CORE}
    priority: 78

  - id: R06_r_up_chaeban
    description: "상향 호환성(form-fit-function) 깨짐 → 부모 채반(NEW 부품) ADD"
    when: {field: r_up_break, truthy: true}
    then: {action: ADD, tier: CASCADE}
    priority: 90

  - id: R07_new_part
    description: "신규(New) 부품 → ADD"
    when: {field: event, equals: "New"}
    then: {action: ADD, tier: CORE}
    priority: 60

  - id: R08_change_part
    description: "변경(Change) 부품 → MODIFY"
    when: {field: event, equals: "Change"}
    then: {action: MODIFY, tier: CORE}
    priority: 55

  - id: R09_carryover
    description: "유지(Carry-over) → KEEP"
    when: {field: event, equals: "Carry-over"}
    then: {action: KEEP, tier: CORE}
    priority: 20

  - id: R10_safety_classification
    description: "안전 분류 부품 → 영향도 보수적 CHECK"
    when: {field: classification, in: ["안전", "Safety", "안전부품"]}
    then: {action: CHECK, tier: CORE}
    priority: 88
