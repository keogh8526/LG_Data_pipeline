# v2.0 §7-2 — Query Router 규칙.
#
# 각 케이스가 순서대로 평가됨. 첫 번째 매칭 케이스의 SearchPlan이 사용됨.
# Python 코드(src/search/router.py)는 이 파일을 로드해 룰 기반 분기.

cases:
  - name: exact_part_no
    pattern: '\b[A-Z]{2,3}\d{7,8}\b'
    mode: exact_sql
    sql_filter_field: part_no
    expand_graph: false

  - name: exact_model_code
    # 영문 2-5자 + 숫자 3-5자 + 옵셔널 영숫자 suffix + 옵셔널 .suffix.
    # "DRBFM"(숫자 없음), "BO24"(짧음) 등 비-모델 영문 약자는 매칭 안 되도록 엄격.
    # 실측 매치: WSED7667M, LSIU6339XE, BO605G1S5, WDEK9429S.ATTLSNA 등.
    # non-capturing group(?:...)으로 re.finditer 매치도 안전.
    pattern: '\b[A-Z]{2,5}\d{3,5}[A-Z0-9]*(?:\.[A-Z0-9.]+)?\b'
    pattern_min_match_len: 7
    mode: exact_sql_plus_vector
    sql_filter_field: new_model_code
    expand_graph: true

  - name: reason_query
    keywords: ["왜", "사유", "이유", "원인", "why"]
    mode: multi_vector
    vector_weights:
      change_reason_emb: 0.5
      narrative_emb: 0.3
      drbfm_emb: 0.2
    expand_graph: true

  - name: test_query
    keywords: ["시험", "검증", "test", "DV", "PV", "PQ"]
    mode: multi_vector_with_join
    vector_weights:
      test_plan_emb: 0.5
      narrative_emb: 0.5
    join_tables: ["test_plans"]
    expand_graph: true

  - name: change_point_query
    keywords: ["변경점", "어떻게 바꿨", "what changed", "스펙 변경"]
    mode: multi_vector
    vector_weights:
      change_point_emb: 0.6
      narrative_emb: 0.4
    expand_graph: true

  - name: drbfm_query
    keywords: ["DRBFM", "리스크", "위험", "failure", "fault"]
    mode: multi_vector
    vector_weights:
      drbfm_emb: 0.5
      narrative_emb: 0.5
    expand_graph: true

# 기본 (어떤 케이스에도 매칭 안 됐을 때)
default:
  mode: single_vector
  primary_vector: narrative_emb
  expand_graph: true

# Retrieval / fusion 파라미터
retrieve:
  dense_candidates: 30
  sparse_candidates: 30
  rrf_k: 60
  rerank_top_k: 5
