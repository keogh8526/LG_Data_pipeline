[project]
name = "lg-bom-agent"
version = "0.1.0"
description = "LG appliance development-parts master + BOM data pipeline"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "openpyxl>=3.1",
    "pandas>=2.2",
    "pyarrow>=16.0",
    "pydantic>=2.7",
    "jsonschema>=4.22",
    "pyyaml>=6.0",
    "neo4j>=5.20",
    "rapidfuzz>=3.9",
    "rich>=13.7",
    "structlog>=24.1",
    "typer>=0.12",
    "pandera>=0.20",
    "diskcache>=5.6",
    "langgraph>=0.2",
    "langchain>=0.2",
    "langchain-community>=0.2",
    "ollama>=0.2",
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "streamlit>=1.32",
    "requests>=2.31",
]

[project.optional-dependencies]
# Local embedding fallback (BGE-M3 via sentence-transformers; ~2GB download).
embed = [
    "sentence-transformers>=3.0",
]
# Schema-guided structured output enforcement.
structured = [
    "outlines>=0.0.40",
]
# One-time external LLM use for schema-mapping rule generation only.
llm = [
    "openai>=1.30",
]
dev = [
    "pytest>=8.2",
    "mypy>=1.10",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src", "ontology"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
