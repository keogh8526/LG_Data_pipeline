[project]
name = "lg-bom-agent"
version = "0.1.0"
description = "LG appliance development-parts master + BOM data pipeline"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "openpyxl>=3.1",
    "pandas>=2.2",
    "pyarrow>=16.0",
    "pydantic>=2.7",
    "jsonschema>=4.22",
    "pyyaml>=6.0",
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9",
    "alembic>=1.13",
    "neo4j>=5.20",
    "qdrant-client>=1.9",
    "rapidfuzz>=3.9",
    "rich>=13.7",
    "structlog>=24.1",
    "typer>=0.12",
    "pandera>=0.20",
    "diskcache>=5.6",
]

[project.optional-dependencies]
embed = [
    "sentence-transformers>=3.0",
]
llm = [
    "openai>=1.30",
]
dev = [
    "pytest>=8.2",
    "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src", "ontology"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
